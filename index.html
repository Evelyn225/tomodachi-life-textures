<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Browse and download free fan-made textures for Tomodachi Life: Living the Dream. PNG textures for face paint, food, and goods uploaded by the community.">
  <meta name="keywords" content="Tomodachi Life Living the Dream textures, Tomodachi Life textures, Living the Dream PNG, face paint textures, food textures, TomoTexture, fan-made textures">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Tomodachi Life: Living the Dream Textures">
  <meta property="og:description" content="Free fan-made PNG textures for Tomodachi Life: Living the Dream. Face paint, food, and goods uploaded by the community.">
  <meta property="og:url" content="https://tomodachilifetextures.com/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Tomodachi Life Textures">
  <link rel="canonical" href="https://tomodachilifetextures.com/">
  <link rel="search" type="application/opensearchdescription+xml" title="Tomodachi Life Textures" href="/opensearch.xml">
  <title>Tomodachi Life: Living the Dream Textures | Free Fan-Made PNG Downloads</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Tomodachi Life Textures",
    "alternateName": "Tomodachi Life: Living the Dream Textures",
    "url": "https://tomodachilifetextures.com/",
    "description": "Free fan-made PNG textures for Tomodachi Life: Living the Dream. Face paint, food, and goods uploaded by the community.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://tomodachilifetextures.com/?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <a href="index.html" class="brand">Tomodachi Life Textures</a>
    <nav class="nav" id="nav"></nav>
  </header>

  <div class="container">
    <div class="controls">
      <div class="controls-group">
        <span class="controls-label">Sort</span>
        <button class="sort-btn active" data-sort="newest">Newest</button>
        <button class="sort-btn" data-sort="popular">Most Downloaded</button>
      </div>
      <div class="controls-group">
        <span class="controls-label">Category</span>
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="face paint">Face Paint</button>
        <button class="filter-btn" data-cat="food">Food</button>
        <button class="filter-btn" data-cat="treasures">Treasures</button>
      </div>
      <div class="controls-group" style="margin-left:auto">
        <input class="search-input" id="search" type="search" placeholder="Search textures…" autocomplete="off">
      </div>
    </div>
    <div id="loading" class="loading-state"><div class="spinner"></div>Loading textures…</div>
    <div class="grid" id="grid"></div>
    <p class="empty" id="empty" style="display:none">No textures found.</p>
    <p class="empty" id="fetch-error" style="display:none">Failed to load textures. Please refresh the page.</p>
    <div style="text-align:center;padding:24px 0 48px;display:none" id="load-more">
      <button class="btn btn-secondary" id="load-more-btn">Load more</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-msg" id="modal-msg"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary btn-sm" id="modal-cancel-btn">Cancel</button>
        <button class="btn btn-danger btn-sm" id="modal-confirm-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    let allTextures = []
    let currentSort = 'newest'
    let currentCat = 'all'
    let currentSearch = ''
    let sessionIsAdmin = false
    let visibleCount = 24
    const PAGE_SIZE = 24

    function confirmModal(message, confirmLabel = 'Delete') {
      return new Promise(resolve => {
        const overlay = document.getElementById('modal-overlay')
        document.getElementById('modal-msg').textContent = message
        document.getElementById('modal-confirm-btn').textContent = confirmLabel
        overlay.classList.add('show')
        function finish(result) {
          overlay.classList.remove('show')
          confirmBtn.removeEventListener('click', onConfirm)
          cancelBtn.removeEventListener('click', onCancel)
          overlay.removeEventListener('click', onOverlay)
          document.removeEventListener('keydown', onKey)
          resolve(result)
        }
        const confirmBtn = document.getElementById('modal-confirm-btn')
        const cancelBtn = document.getElementById('modal-cancel-btn')
        function onConfirm() { finish(true) }
        function onCancel() { finish(false) }
        function onOverlay(e) { if (e.target === overlay) finish(false) }
        function onKey(e) { if (e.key === 'Escape') finish(false) }
        confirmBtn.addEventListener('click', onConfirm)
        cancelBtn.addEventListener('click', onCancel)
        overlay.addEventListener('click', onOverlay)
        document.addEventListener('keydown', onKey)
      })
    }

    let toastTimer = null
    function showToast(msg, type = '') {
      const el = document.getElementById('toast')
      el.textContent = msg
      el.className = 'toast' + (type ? ` toast-${type}` : '')
      clearTimeout(toastTimer)
      requestAnimationFrame(() => el.classList.add('show'))
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000)
    }

    function esc(str) {
      const d = document.createElement('div')
      d.textContent = str
      return d.innerHTML
    }

    async function buildNav() {
      const { data: { session } } = await db.auth.getSession()
      const nav = document.getElementById('nav')
      if (session) {
        const { data: profile } = await db.from('profiles').select('username, is_admin').eq('id', session.user.id).single()
        const username = profile?.username || ''
        sessionIsAdmin = profile?.is_admin || false
        nav.innerHTML = `
          <a href="upload.html">Upload</a>
          <a href="profile.html?user=${encodeURIComponent(username)}">${esc(username)}</a>
          <a href="help.html">Help</a>
          <button id="logout-btn">Logout</button>`
        document.getElementById('logout-btn').onclick = async () => {
          await db.auth.signOut()
          window.location.reload()
        }
      } else {
        nav.innerHTML = `<a href="help.html">Help</a><a href="auth.html">Login</a>`
      }
    }

    async function loadTextures() {
      document.getElementById('loading').style.display = ''
      const { data, error } = await db
        .from('textures')
        .select('id, title, category, item_type, file_path, download_count, created_at, profiles(username)')
      document.getElementById('loading').style.display = 'none'
      if (error) {
        console.error(error)
        document.getElementById('fetch-error').style.display = ''
        return
      }
      allTextures = data || []
      render()
    }

    function render() {
      let list = [...allTextures]
      if (currentCat === 'treasures') list = list.filter(t => t.category === 'treasures' || t.category === 'goods')
      else if (currentCat !== 'all') list = list.filter(t => t.category === currentCat)
      if (currentSearch) list = list.filter(t => t.title.toLowerCase().includes(currentSearch))
      if (currentSort === 'newest') list.sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
      else list.sort((a, b) => b.download_count - a.download_count)

      const grid = document.getElementById('grid')
      const empty = document.getElementById('empty')
      const moreBtn = document.getElementById('load-more')

      if (!list.length) {
        grid.innerHTML = ''
        empty.style.display = ''
        moreBtn.style.display = 'none'
        return
      }
      empty.style.display = 'none'

      const visible = list.slice(0, visibleCount)
      moreBtn.style.display = list.length > visibleCount ? '' : 'none'

      grid.innerHTML = visible.map(t => {
        const { data: { publicUrl } } = db.storage.from('textures').getPublicUrl(t.file_path)
        const username = t.profiles?.username || 'unknown'
        const count = t.download_count
        const badgeLabel = t.item_type ? `${t.category} / ${t.item_type}` : t.category
        const deleteBtn = sessionIsAdmin
          ? `<button class="btn btn-danger btn-sm del-btn" data-id="${t.id}" data-path="${t.file_path}">Delete</button>`
          : ''
        return `
          <div class="card" id="card-${t.id}">
            <a href="texture.html?id=${t.id}"><img class="card-img" src="${publicUrl}" alt="${esc(t.title)}" loading="lazy"></a>
            <div class="card-body">
              <a class="card-title" href="texture.html?id=${t.id}" style="text-decoration:none;display:block">${esc(t.title)}</a>
              <span class="badge">${esc(badgeLabel)}</span>
              <div class="card-meta">
                <a class="card-uploader" href="profile.html?user=${encodeURIComponent(username)}">${esc(username)}</a>
                <span class="dl-count" data-id="${t.id}" data-count="${count}">${count} download${count !== 1 ? 's' : ''}</span>
              </div>
              <div style="display:flex;gap:6px">
                <button class="btn btn-primary btn-sm dl-btn"
                  data-id="${t.id}"
                  data-path="${t.file_path}"
                  data-title="${esc(t.title)}" style="flex:1">Download</button>
                <button class="btn btn-secondary btn-sm share-btn" data-id="${t.id}">Share</button>
              </div>
              ${deleteBtn}
            </div>
          </div>`
      }).join('')
    }

    async function handleDownload(btn) {
      btn.disabled = true
      btn.textContent = 'Downloading...'
      const { id, path, title } = btn.dataset

      try {
        const { data: { publicUrl } } = db.storage.from('textures').getPublicUrl(path)
        const res = await fetch(publicUrl)
        if (!res.ok) throw new Error(`Download failed: ${res.status}`)
        const blob = await res.blob()
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = `${title}.png`
        document.body.appendChild(a)
        a.click()
        document.body.removeChild(a)
        URL.revokeObjectURL(url)

        await db.rpc('increment_download_count', { texture_id: id })

        const countEl = document.querySelector(`.dl-count[data-id="${id}"]`)
        if (countEl) {
          const current = parseInt(countEl.dataset.count || '0', 10)
          const next = current + 1
          countEl.dataset.count = next
          countEl.textContent = `${next} download${next !== 1 ? 's' : ''}`
        }
      } catch (err) {
        console.error('Download error:', err)
        showToast('Download failed. Please try again.', 'error')
      } finally {
        btn.disabled = false
        btn.textContent = 'Download'
      }
    }

    document.getElementById('load-more-btn').addEventListener('click', () => {
      visibleCount += PAGE_SIZE
      render()
    })

    document.querySelectorAll('.sort-btn').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      currentSort = btn.dataset.sort
      visibleCount = PAGE_SIZE
      render()
    }))

    document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      currentCat = btn.dataset.cat
      visibleCount = PAGE_SIZE
      render()
    }))

    document.getElementById('grid').addEventListener('click', async e => {
      const shareBtn = e.target.closest('.share-btn')
      if (shareBtn) {
        const url = `${location.origin}/texture.html?id=${shareBtn.dataset.id}`
        await navigator.clipboard.writeText(url)
        showToast('Link copied!', 'success')
        return
      }

      const dlBtn = e.target.closest('.dl-btn')
      if (dlBtn) { handleDownload(dlBtn); return }

      const delBtn = e.target.closest('.del-btn')
      if (!delBtn) return
      if (!await confirmModal('Delete this texture? This cannot be undone.')) return

      const { id, path } = delBtn.dataset
      delBtn.disabled = true
      delBtn.textContent = 'Deleting...'

      const { error: dbError } = await db.from('textures').delete().eq('id', id)
      if (dbError) { showToast(dbError.message, 'error'); delBtn.disabled = false; delBtn.textContent = 'Delete'; return }

      await db.storage.from('textures').remove([path])

      const card = document.getElementById(`card-${id}`)
      if (card) card.remove()
      allTextures = allTextures.filter(t => t.id !== id)

      if (!document.querySelector('.card')) {
        document.getElementById('empty').style.display = ''
      }
    })

    let searchTimer = null
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(searchTimer)
      searchTimer = setTimeout(() => {
        currentSearch = e.target.value.trim().toLowerCase()
        visibleCount = PAGE_SIZE
        render()
      }, 200)
    })

    buildNav().then(loadTextures)
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
