<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Profile — Tomodachi Life Textures</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <a href="index.html" class="brand">Tomodachi Life Textures</a>
    <nav class="nav" id="nav"></nav>
  </header>

  <div class="container">
    <div class="profile-header" id="profile-header" style="display:none">
      <div class="profile-username" id="profile-username"></div>
      <div class="profile-joined" id="profile-joined"></div>
    </div>
    <p class="empty" id="not-found" style="display:none">User not found.</p>
    <div class="grid" id="grid"></div>
    <p class="empty" id="empty" style="display:none">No textures uploaded yet.</p>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    let toastTimer = null
    function showToast(msg, type = '') {
      const el = document.getElementById('toast')
      el.textContent = msg
      el.className = 'toast' + (type ? ` toast-${type}` : '')
      clearTimeout(toastTimer)
      requestAnimationFrame(() => el.classList.add('show'))
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000)
    }

    function esc(str) {
      const d = document.createElement('div')
      d.textContent = str
      return d.innerHTML
    }

    const params = new URLSearchParams(window.location.search)
    const targetUsername = params.get('user')

    if (!targetUsername) {
      window.location.href = 'index.html'
    }

    async function init() {
      const { data: { session } } = await db.auth.getSession()

      // Build nav
      const nav = document.getElementById('nav')
      if (session) {
        const { data: sessionProfile } = await db.from('profiles').select('username, is_admin').eq('id', session.user.id).single()
        const sessionUsername = sessionProfile?.username || ''
        const isAdmin = sessionProfile?.is_admin || false
        nav.innerHTML = `
          <a href="index.html">Browse</a>
          <a href="upload.html">Upload</a>
          <a href="profile.html?user=${encodeURIComponent(sessionUsername)}">${esc(sessionUsername)}</a>
          <button onclick="db.auth.signOut().then(() => window.location.href = 'index.html')">Logout</button>`
      } else {
        nav.innerHTML = `<a href="auth.html">Login</a>`
      }

      // Load target profile
      const { data: profile, error: profileError } = await db
        .from('profiles')
        .select('id, username, created_at, is_banned')
        .eq('username', targetUsername)
        .maybeSingle()

      if (profileError) {
        console.error(profileError)
        document.getElementById('not-found').style.display = ''
        return
      }

      if (!profile) {
        document.getElementById('not-found').style.display = ''
        return
      }

      // Update title
      document.title = `${profile.username} — Tomodachi Life Textures`

      // Show profile header
      document.getElementById('profile-username').textContent = profile.username
      const joined = new Date(profile.created_at)
      const joinedStr = joined.toLocaleString('en-US', { month: 'long', year: 'numeric' })
      const bannedTag = profile.is_banned ? ' <span style="font-size:0.75rem;background:rgba(158,74,90,0.25);color:#e08090;border:1px solid #6e3040;border-radius:4px;padding:2px 8px;vertical-align:middle">Banned</span>' : ''
      document.getElementById('profile-joined').innerHTML = `Joined ${joinedStr}${bannedTag}`
      document.getElementById('profile-header').style.display = ''

      const isOwn = session && session.user.id === profile.id
      const canDelete = isOwn || isAdmin

      // Ban button (admin only, not on own profile)
      if (isAdmin && !isOwn) {
        const banBtn = document.createElement('button')
        banBtn.className = 'btn btn-danger btn-sm'
        banBtn.style.marginTop = '12px'
        banBtn.textContent = profile.is_banned ? 'Unban User' : 'Ban User'
        banBtn.addEventListener('click', async () => {
          const newState = !profile.is_banned
          banBtn.disabled = true
          const { error } = await db.from('profiles').update({ is_banned: newState }).eq('id', profile.id)
          if (error) { showToast(error.message, 'error'); banBtn.disabled = false; return }
          profile.is_banned = newState
          banBtn.textContent = newState ? 'Unban User' : 'Ban User'
          banBtn.disabled = false
          const bannedTagNew = newState ? ' <span style="font-size:0.75rem;background:rgba(158,74,90,0.25);color:#e08090;border:1px solid #6e3040;border-radius:4px;padding:2px 8px;vertical-align:middle">Banned</span>' : ''
          document.getElementById('profile-joined').innerHTML = `Joined ${joinedStr}${bannedTagNew}`
          showToast(newState ? 'User banned.' : 'User unbanned.', newState ? 'error' : 'success')
        })
        document.getElementById('profile-header').appendChild(banBtn)
      }

      // Load textures
      const { data: textures, error: texturesError } = await db
        .from('textures')
        .select('id, title, category, item_type, file_path, download_count, created_at')
        .eq('user_id', profile.id)
        .order('created_at', { ascending: false })

      if (texturesError) {
        console.error(texturesError)
        document.getElementById('empty').style.display = ''
        return
      }

      const list = textures || []

      if (!list.length) {
        document.getElementById('empty').style.display = ''
        return
      }

      const grid = document.getElementById('grid')
      grid.innerHTML = list.map(t => {
        const { data: { publicUrl } } = db.storage.from('textures').getPublicUrl(t.file_path)
        const count = t.download_count
        const badgeLabel = (t.category === 'goods' && t.item_type)
          ? `goods — ${t.item_type}`
          : t.category
        const deleteBtn = canDelete
          ? `<button class="btn btn-danger btn-sm del-btn" data-id="${t.id}" data-path="${t.file_path}">Delete</button>`
          : ''
        return `
          <div class="card" id="card-${t.id}">
            <a href="texture.html?id=${t.id}"><img class="card-img" src="${publicUrl}" alt="${esc(t.title)}" loading="lazy"></a>
            <div class="card-body">
              <a class="card-title" href="texture.html?id=${t.id}" style="text-decoration:none;display:block">${esc(t.title)}</a>
              <span class="badge">${esc(badgeLabel)}</span>
              <div class="card-meta">${count} download${count !== 1 ? 's' : ''}</div>
              <div style="display:flex;gap:6px">
                <button class="btn btn-secondary btn-sm share-btn" data-id="${t.id}" style="flex:1">Share</button>
                ${deleteBtn}
              </div>
            </div>
          </div>`
      }).join('')

      // Share + Delete handling
      grid.addEventListener('click', async e => {
        const shareBtn = e.target.closest('.share-btn')
        if (shareBtn) {
          const url = `${location.origin}/texture.html?id=${shareBtn.dataset.id}`
          await navigator.clipboard.writeText(url)
          showToast('Link copied!', 'success')
          return
        }

        const btn = e.target.closest('.del-btn')
        if (!btn) return

        if (!confirm('Delete this texture? This cannot be undone.')) return

        const id = btn.dataset.id
        const path = btn.dataset.path

        btn.disabled = true
        btn.textContent = 'Deleting...'

        const { error: dbError } = await db.from('textures').delete().eq('id', id)
        if (dbError) {
          showToast(dbError.message, 'error')
          btn.disabled = false
          btn.textContent = 'Delete'
          return
        }

        await db.storage.from('textures').remove([path])

        const card = document.getElementById(`card-${id}`)
        if (card) card.remove()

        if (!grid.children.length) {
          grid.innerHTML = ''
          document.getElementById('empty').style.display = ''
        }
      })
    }

    init()
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
