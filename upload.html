<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Upload your own PNG textures for Tomodachi Life: Living the Dream and share them with the community.">
  <title>Upload Texture — Tomodachi Life Textures</title>
  <meta name="theme-color" content="#a899e0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <a href="index.html" class="brand">Tomodachi Life Textures</a>
    <nav class="nav" id="nav"></nav>
  </header>

  <div class="form-page">
    <div class="form-card">
      <div class="form-title">Upload Texture</div>
      <div id="msg" class="msg"></div>

      <form id="upload-form" onsubmit="handleUpload(event)">
        <div class="form-group">
          <label class="form-label" for="title" style="display:flex;justify-content:space-between;align-items:center">
            Texture title
            <span id="title-count" style="font-weight:400;color:#7a7d9a;font-size:0.78rem">0 / 80</span>
          </label>
          <input class="form-input" type="text" id="title" required maxlength="80" placeholder="e.g. Yummy Cake">
        </div>
        <div class="form-group">
          <label class="form-label" for="category">Category</label>
          <select class="form-select" id="category" required onchange="onCategoryChange()">
            <option value="" disabled selected>Select a category</option>
            <option value="face paint">Face Paint</option>
            <option value="food">Food</option>
            <option value="treasures">Treasures (Books, Games, Pets, Music, Other Treasures)</option>
          </select>
        </div>
        <div class="form-group" id="treasure-type-group" style="display:none">
          <label class="form-label" for="treasure-type">Treasure type</label>
          <select class="form-select" id="treasure-type" onchange="onTreasureTypeChange()">
            <option value="book">Books (185 × 258)</option>
            <option value="game">Games (256 × 144)</option>
            <option value="pets">Pets (256 × 256)</option>
            <option value="music">Music (256 × 256)</option>
            <option value="">Other Treasures (256 × 256)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="file-input">PNG file</label>
          <p id="dimension-hint" class="dimension-hint">Select a category above first</p>
          <div class="upload-area upload-locked" id="upload-area">
            <img id="preview" class="upload-preview" style="display:none" alt="preview">
            <p id="upload-hint">Select a category above to unlock</p>
          </div>
          <input type="file" id="file-input" accept=".png,image/png" style="display:none">
        </div>
        <button class="btn btn-primary btn-full" type="submit" id="submit-btn" disabled>Upload</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    let currentUser = null
    let validFile = null
    let currentPreviewUrl = null

    function esc(str) {
      const d = document.createElement('div')
      d.textContent = str
      return d.innerHTML
    }

    const DIMENSIONS = {
      book:    { w: 185, h: 258 },
      game:    { w: 256, h: 144 },
      default: { w: 256, h: 256 }
    }

    function isCategoryReady() {
      return !!document.getElementById('category').value
    }

    function getExpectedDimensions() {
      const cat = document.getElementById('category').value
      const type = document.getElementById('treasure-type').value
      if (cat === 'treasures' && type === 'book') return DIMENSIONS.book
      if (cat === 'treasures' && type === 'game') return DIMENSIONS.game
      return DIMENSIONS.default
    }

    function getDimensionHintText() {
      const cat = document.getElementById('category').value
      if (!cat) return 'Select a category above first'
      const dim = getExpectedDimensions()
      return `Required: ${dim.w} × ${dim.h} px`
    }

    function setUploadLocked(locked) {
      const area = document.getElementById('upload-area')
      if (locked) {
        area.classList.add('upload-locked')
        document.getElementById('upload-hint').textContent = 'Select a category above to unlock'
        document.getElementById('upload-hint').style.display = ''
      } else {
        area.classList.remove('upload-locked')
        document.getElementById('upload-hint').textContent = 'Click or drag a PNG file here'
      }
    }

    function onCategoryChange() {
      const cat = document.getElementById('category').value
      document.getElementById('treasure-type-group').style.display = cat === 'treasures' ? '' : 'none'
      if (cat !== 'treasures') document.getElementById('treasure-type').value = ''
      updateDimensionHint()
      clearFileSelection()
      setUploadLocked(!isCategoryReady())
    }

    function onTreasureTypeChange() {
      updateDimensionHint()
      clearFileSelection()
    }

    function updateDimensionHint() {
      document.getElementById('dimension-hint').textContent = getDimensionHintText()
    }

    function clearFileSelection() {
      validFile = null
      if (currentPreviewUrl) { URL.revokeObjectURL(currentPreviewUrl); currentPreviewUrl = null }
      document.getElementById('submit-btn').disabled = true
      document.getElementById('preview').style.display = 'none'
      document.getElementById('upload-hint').style.display = ''
      document.getElementById('file-input').value = ''
      showMsg('', '')
    }

    async function init() {
      const { data: { session } } = await db.auth.getSession()
      if (!session) { window.location.href = 'auth.html'; return }
      currentUser = session.user

      const { data: profile } = await db.from('profiles').select('username').eq('id', session.user.id).single()
      const username = profile?.username || ''
      document.getElementById('nav').innerHTML = `
        <a href="index.html">Browse</a>
        <a href="profile.html?user=${encodeURIComponent(username)}">${esc(username)}</a>
        <a href="help.html">Help</a>
        <button onclick="db.auth.signOut().then(() => window.location.href = 'index.html')">Logout</button>`
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg')
      el.textContent = text
      el.className = 'msg' + (type ? ` msg-${type}` : '')
      el.style.display = text ? '' : 'none'
    }

    const uploadArea = document.getElementById('upload-area')

    uploadArea.addEventListener('click', () => {
      if (!isCategoryReady()) return
      document.getElementById('file-input').click()
    })

    uploadArea.addEventListener('dragover', e => {
      e.preventDefault()
      if (isCategoryReady()) uploadArea.style.borderColor = '#a899e0'
    })
    uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '' })
    uploadArea.addEventListener('drop', e => {
      e.preventDefault()
      uploadArea.style.borderColor = ''
      if (!isCategoryReady()) return
      const file = e.dataTransfer.files[0]
      if (!file) return
      const dt = new DataTransfer()
      dt.items.add(file)
      const input = document.getElementById('file-input')
      input.files = dt.files
      input.dispatchEvent(new Event('change'))
    })

    document.getElementById('file-input').addEventListener('change', e => {
      const file = e.target.files[0]
      if (!file) return

      if (currentPreviewUrl) { URL.revokeObjectURL(currentPreviewUrl); currentPreviewUrl = null }
      validFile = null
      document.getElementById('submit-btn').disabled = true
      document.getElementById('preview').style.display = 'none'
      document.getElementById('upload-hint').style.display = ''
      showMsg('', '')

      if (file.type !== 'image/png') {
        showMsg('File must be a PNG image.', 'error')
        return
      }

      const expected = getExpectedDimensions()
      const objectUrl = URL.createObjectURL(file)
      const img = new Image()
      img.onload = () => {
        if (img.width !== expected.w || img.height !== expected.h) {
          URL.revokeObjectURL(objectUrl)
          showMsg(`Image must be ${expected.w}×${expected.h} px. Yours is ${img.width}×${img.height}.`, 'error')
          return
        }
        validFile = file
        currentPreviewUrl = objectUrl
        document.getElementById('submit-btn').disabled = false
        showMsg('', '')
        const preview = document.getElementById('preview')
        preview.src = objectUrl
        preview.style.display = ''
        document.getElementById('upload-hint').style.display = 'none'
      }
      img.onerror = () => { URL.revokeObjectURL(objectUrl); showMsg('Could not read image.', 'error') }
      img.src = objectUrl
    })

    async function handleUpload(e) {
      e.preventDefault()
      if (!validFile) return

      const btn = document.getElementById('submit-btn')
      btn.disabled = true
      btn.textContent = 'Uploading...'
      showMsg('', '')

      const title = document.getElementById('title').value.trim()
      const category = document.getElementById('category').value
      const treasureType = document.getElementById('treasure-type').value
      const itemType = (category === 'treasures' && treasureType) ? treasureType : null
      const textureId = crypto.randomUUID()
      const filePath = `${currentUser.id}/${textureId}.png`

      try {
        const { error: uploadError } = await db.storage.from('textures').upload(filePath, validFile)
        if (uploadError) throw new Error(uploadError.message)

        const { error: insertError } = await db.from('textures').insert({
          id: textureId,
          user_id: currentUser.id,
          title,
          category,
          item_type: itemType,
          file_path: filePath
        })
        if (insertError) {
          await db.storage.from('textures').remove([filePath])
          throw new Error(insertError.message)
        }

        document.getElementById('upload-form').reset()
        validFile = null
        if (currentPreviewUrl) { URL.revokeObjectURL(currentPreviewUrl); currentPreviewUrl = null }
        document.getElementById('preview').style.display = 'none'
        document.getElementById('upload-hint').style.display = ''
        document.getElementById('treasure-type-group').style.display = 'none'
        document.getElementById('dimension-hint').textContent = 'Select a category above first'
        setUploadLocked(true)
        showMsg('Texture uploaded successfully!', 'success')
        btn.disabled = true
        btn.textContent = 'Upload'
      } catch (err) {
        showMsg(`Upload failed: ${err.message}`, 'error')
        btn.disabled = false
        btn.textContent = 'Upload'
      }
    }

    document.getElementById('title').addEventListener('input', e => {
      document.getElementById('title-count').textContent = `${e.target.value.length} / 80`
    })

    init()
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
